version: '3.9'

services:
  # ── MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: snip_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: url_shortener
      MYSQL_USER: url_user
      MYSQL_PASSWORD: url_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'url_user', '-purl_password']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - snip_network

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: snip_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - snip_network

  # ── Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snip_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      REDIS_HOST: redis
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - snip_network

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: snip_frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - snip_network

volumes:
  mysql_data:
  redis_data:

networks:
  snip_network:
    driver: bridge
